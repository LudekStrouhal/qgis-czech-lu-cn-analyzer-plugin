# This list contains buffer options, values in controlling_atr_name change length of buffers for point/line objects. Distance is in meters.
buffer_layers:
  - input_layer_name: "SilniceDalnice"
    controlling_atr_name: "typsil_k"
    buffer_levels:
      - priority: "1"
        values: ["D1", "D2"]
        distance: 18
      - priority: "4"
        values: ["M"]
        distance: 15
      - priority: "2"
        values: ["D1p", "D2p"]
        distance: 9
      - priority: "3"
        values: ["D1v", "D2v"]
        distance: 9
      - priority: "5"
        values: ["Mp", "Mv"]
        distance: 7.5
      - priority: "6"
        values: ["S1"]
        distance: 7
      - priority: "7"
        values: ["S2"]
        distance: 5
      - priority: "8"
        values: ["S3"]
        distance: 4
      - priority: "6"
        values: ["S1v", "S1p"]
        distance: 3.5
      - priority: "7"
        values: ["S2v", "S2p"]
        distance: 2.5
      - priority: "8"
        values: ["S3v", "S3p"]
        distance: 2.0
    default_buffer: 4

  - input_layer_name: "SilniceVeVystavbe"
    controlling_atr_name: "NaN"
    default_buffer: 5.5

  - input_layer_name: "SilniceNeevidovana"
    controlling_atr_name: "NaN"
    default_buffer: 2.5

  - input_layer_name: "Ulice"
    controlling_atr_name: "typulice_k"
    buffer_levels:
      - priority: "1"
        values: ["026", "926"] # US, USm - ulice sjízdná v sídle a mimo sídlo
        distance: 3.0
      - priority: "2"
        values: ["225"] # Uch - ulice typu chodník
        distance: 2.0
      - priority: "3"
        values: ["025"] # UN - ulice nesjízdná v sídle
        distance: 1.5
      - priority: "4"
        values: ["925"] # UNm - ulice nesjízdná mimo sídlo
        distance: 1.0
      - priority: "5"
        values: ["125"] # UX - ulice neexistující v terénu
        distance: 0.0
    default_buffer: 2.0

  - input_layer_name: "Cesta"
    controlling_atr_name: "typcesty_k"
    buffer_levels:
      - priority: "1"
        values: ["026"]  # cesta udržovaná
        distance: 2.0
      - priority: "3"
        values: ["025"]  # cesta neudržovaná
        distance: 1.0
      - priority: "2"
        values: ["099"]  # cesta parková a hřbitovní
        distance: 1.25
    default_buffer: 1.5

  - input_layer_name: "LiniovaVegetace"
    controlling_atr_name: "TYPVEG_K"
      - priority: "1"
        values: ["S"] # stromořadí
        distance: 2.5
      - priority: "2"
        values: ["Z"] # živý plot
        distance: 0.0
    default_buffer: 2.5
 
  - input_layer_name: "ZeleznicniTrat"
    controlling_atr_name: "NaN"
    default_buffer: 2.5

  - input_layer_name: "ZeleznicniVlecka"
    controlling_atr_name: "NaN"
    default_buffer: 2.5
    
